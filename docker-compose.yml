services:
  # ---------------------------------------------------------------------------
  # Database - PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # API - NestJS
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: ${APP_NAME}-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
    ports:
      - "${FORWARD_API_PORT:-3000}:3000"
    volumes:
      - ./src/api:/app
      - api-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Frontend - Angular
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ${APP_NAME}-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${FORWARD_FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./src/frontend:/app
      - frontend-node-modules:/app/node_modules
    command: npx ng serve --host 0.0.0.0 --poll 2000
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Storybook - Component Library
  # ---------------------------------------------------------------------------
  storybook:
    build:
      context: .
      dockerfile: docker/storybook/Dockerfile
    container_name: ${APP_NAME}-storybook
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${FORWARD_STORYBOOK_PORT:-6006}:6006"
    volumes:
      - ./src/frontend/src:/app/src:ro
      - ./src/frontend/.storybook:/app/.storybook:ro
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "${FORWARD_HTTP_PORT:-80}:80"
      - "${FORWARD_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates
      - ./certs:/etc/nginx/certs
    environment:
      APP_NAME: ${APP_NAME}
      DOMAIN: ${DOMAIN}
      API_PORT: 3000
      FRONTEND_PORT: 4200
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-32M}
      SWAGGER_EDGE_POLICY: ""
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Redis - Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # pgAdmin - Database UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${APP_NAME}-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${FORWARD_PGADMIN_PORT:-8082}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Mailhog - Email Testing
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${APP_NAME}-mailhog
    ports:
      - "${FORWARD_MAILHOG_SMTP_PORT:-1025}:1025"
      - "${FORWARD_MAILHOG_PORT:-8025}:8025"
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # MkCert - SSL Certificates
  # ---------------------------------------------------------------------------
  mkcert:
    build:
      context: ./docker/mkcert
      dockerfile: Dockerfile
    container_name: ${APP_NAME}-mkcert
    volumes:
      - ./certs:/certs
    environment:
      DOMAIN: ${DOMAIN}
    networks:
      - app-network

volumes:
  # Same convention as the network below: the key is the internal alias the
  # services reference, `name` is the real volume name in Docker. Without an
  # explicit `name`, Compose prefixes the key with the project name — which
  # defaults to the directory basename, so renaming or cloning the repo into a
  # different folder would silently point at brand-new, empty volumes.
  db-data:
    name: ${APP_NAME}-db-data
    driver: local
  api-node-modules:
    name: ${APP_NAME}-api-node-modules
    driver: local
  frontend-node-modules:
    name: ${APP_NAME}-frontend-node-modules
    driver: local
  redis-data:
    name: ${APP_NAME}-redis-data
    driver: local
  pgadmin-data:
    name: ${APP_NAME}-pgadmin-data
    driver: local

networks:
  # Key is the internal alias services reference — keep it stable and
  # independent of APP_NAME. `name` is the actual network name in Docker,
  # and that's where APP_NAME is substituted.
  app-network:
    name: ${APP_NAME}-network
    driver: bridge
